server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.talklink\.space$ talklink.space localhost;

    # SEO sitemap and robots directly from backend
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API requests to FastAPI
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket requests
    location /ws/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Static assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Everything else: try static file first, if not found, proxy to FastAPI (for index.html injection)
    location / {
        root /usr/share/nginx/html;
        # We remove $uri/ to prevent Nginx from serving index.html directly for /
        # This forces the request to go to @fastapi where SEO injection happens.
        try_files $uri @fastapi;
    }

    location @fastapi {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
