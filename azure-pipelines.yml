# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- v3-temp

resources:
- repo: self

variables:
  # Set to the name or ID of your Azure DevOps ARM (Azure Resource Manager) service connection.
  # Recommended: define a pipeline variable named AZURE_SERVICE_CONNECTION in Azure DevOps UI and set it to your ARM connection.
  # IMPORTANT: Do NOT use a Docker Registry service connection here. It must be of type AzureRM.
  azureSubscription: 'Azure subscription Giter (79391428-3302-4885-804c-b1ee4fe7ba36)'
  acrName: 'giterappregistry'
  webAppName: 'web-calls'
  resourceGroup: 'GiterApps'
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'eecef7a1-dbfa-4c23-be4f-e2b972aeee5a'
  imageRepository: 'webcall'
  containerRegistry: 'giterappregistry.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  imageTag: '$(Build.BuildId)'
  # Agent VM image name
  vmImageName: 'ubuntu-latest'
  botToken: '6678471987:AAFai4oovnmwximgMt-7433LGSrzchzVC9k'
  chatId: '474921250'

stages:
  - stage: NotifyStart
    displayName: 'Notify Start'
    jobs:
      - job: NotifyStartJob
        displayName: 'Send Telegram Notification'
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              curl -X POST "https://api.telegram.org/bot$(botToken)/sendMessage" \
                -d "chat_id=$(chatId)" \
                -d "text=🚀 Pipeline started: $(Build.DefinitionName) (Build: $(Build.BuildNumber))"
            displayName: 'Send Telegram Notification'
  - stage: Build_Deploy
    displayName: Build and push stage
    dependsOn: NotifyStart
    jobs:
      - job: Build
        displayName: Build
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: Docker@2
            displayName: Build and push an image to container registry
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
  - stage: Deploy
    displayName: Deploy web app
    dependsOn: Build_Deploy
    jobs:
      - job: Deploy
        displayName: Deploy
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: AzureRmWebAppDeployment@4
            displayName: 'Azure App Service Deploy certificate service'
            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: 'Azure subscription Giter (79391428-3302-4885-804c-b1ee4fe7ba36)'
              appType: 'webAppContainer'
              WebAppName: 'web-calls'
              DockerNamespace: $(containerRegistry)
              DockerRepository: $(imageRepository)
              DockerImageTag: '$(tag)'
  - stage: NotifySuccess
    displayName: 'Notify Success'
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: NotifySuccessJob
        displayName: 'Send Success Telegram Notification'
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              curl -X POST "https://api.telegram.org/bot$(botToken)/sendMessage" \
                -d "chat_id=$(chatId)" \
                -d "text=✅ Pipeline Succeeded: $(Build.DefinitionName) (Build: $(Build.BuildNumber))"
            displayName: 'Send Telegram Notification'

  - stage: NotifyFailure
    displayName: 'Notify Failure'
    dependsOn:
      - Build_Deploy
      - Deploy
    condition: failed()
    jobs:
      - job: NotifyFailureJob
        displayName: 'Send Failure Telegram Notification'
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              curl -X POST "https://api.telegram.org/bot$(botToken)/sendMessage" \
                -d "chat_id=$(chatId)" \
                -d "text=❌ Pipeline Failed: $(Build.DefinitionName) (Build: $(Build.BuildNumber))"
            displayName: 'Send Telegram Notification'
